name: Sync with JIRA

on:
  workflow_dispatch: 
  issues: 
    types:
      - opened
      - edited
      - transferred
      - reopened

jobs:
  sync-to-jira:
    uses: telicent-oss/shared-workflows/.github/workflows/jira-sync.yml@main
    with:
      jira-url: https://telicent.atlassian.net
      jira-project: TELFE
      issue-mapping-file: .github/jira-mapping-rules.yml
      extra-sync-options: "--skip-existing"
    secrets: inherit

  
